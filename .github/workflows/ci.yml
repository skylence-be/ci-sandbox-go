name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-workflows:
    name: Workflow lint (actionlint + zizmor)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: "false" }
      - uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with: { tool: zizmor@1.26.1 }
      - name: Install actionlint (pinned, checksum-verified, no root)
        run: |
          set -euo pipefail
          V=1.7.12
          F="actionlint_${V}_linux_amd64.tar.gz"
          curl -fsSLo "$F" "https://github.com/rhysd/actionlint/releases/download/v${V}/${F}"
          curl -fsSLo checksums.txt "https://github.com/rhysd/actionlint/releases/download/v${V}/actionlint_${V}_checksums.txt"
          grep " ${F}$" checksums.txt | sha256sum -c -
          tar xzf "$F" actionlint
          mkdir -p "$HOME/.local/bin"
          install actionlint "$HOME/.local/bin/actionlint"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: actionlint
      - run: zizmor .github/workflows/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-go:
    name: Go Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: "false" }
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          # std-lib-only module: no go.sum for the cache key, so caching is off.
          cache: false
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
      - run: golangci-lint run ./...

  test-go:
    name: Go Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-go]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: "false" }
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Test with coverage (gate 80% lines)
        env:
          COVERAGE_MIN: "100"
        run: |
          set -euo pipefail
          go test ./... -race -count=1 -covermode=atomic -coverpkg=./app/...,./greet/... -coverprofile=coverage.out
          go tool cover -func=coverage.out
          TOTAL=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/, "", $3); print $3}')
          {
            echo "### Go coverage"
            echo ""
            echo "total: ${TOTAL}% (gate: ${COVERAGE_MIN}%)"
          } >> "$GITHUB_STEP_SUMMARY"
          go tool cover -html=coverage.out -o coverage.html
          awk -v t="$TOTAL" -v m="$COVERAGE_MIN" 'BEGIN { exit !(t + 0 >= m + 0) }' \
            || { echo "::error::coverage ${TOTAL}% is below the ${COVERAGE_MIN}% gate"; exit 1; }
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-coverage
          path: |
            coverage.out
            coverage.html

  vuln-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test-go]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: "false" }
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Install govulncheck
        # Pinned: the private-repo review flagged @latest as drift-prone.
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - run: govulncheck ./...

  summary:
    name: Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint-workflows, lint-go, test-go, vuln-scan]
    if: always()
    env:
      R_LINTWF: ${{ needs.lint-workflows.result }}
      R_LINT: ${{ needs.lint-go.result }}
      R_TEST: ${{ needs.test-go.result }}
      R_VULN: ${{ needs.vuln-scan.result }}
    steps:
      - name: Render summary
        run: |
          {
            echo "### Go CI (hosted)"
            echo ""
            echo "| Stage | Result |"
            echo "|-------|--------|"
            echo "| Workflow lint | $R_LINTWF |"
            echo "| Go Lint | $R_LINT |"
            echo "| Go Test | $R_TEST |"
            echo "| Vulnerability Scan | $R_VULN |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Fail if any stage failed
        run: |
          for r in "$R_LINTWF" "$R_LINT" "$R_TEST" "$R_VULN"; do
            [ "$r" = "success" ] || { echo "::error::a stage did not succeed ($r)"; exit 1; }
          done
