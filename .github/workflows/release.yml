name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

permissions: {}

concurrency:
  group: release-ci-sandbox-go
  cancel-in-progress: false

jobs:
  tag:
    name: Compute and push tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: "0", persist-credentials: "false" }
      - name: Compute next version
        id: ver
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          LATEST=$(git tag -l 'v*' | sort -V | tail -1)
          [ -n "$LATEST" ] || LATEST="v0.0.0"
          VER="${LATEST#v}"
          MAJOR=$(echo "$VER" | cut -d. -f1); MINOR=$(echo "$VER" | cut -d. -f2); PATCH=$(echo "$VER" | cut -d. -f3)
          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          echo "tag=v${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
      - name: Create tag via API (no git credentials on disk)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: gh api "repos/$GITHUB_REPOSITORY/git/refs" -f ref="refs/tags/$TAG" -f sha="$GITHUB_SHA"

  build:
    name: goreleaser build (archives)
    needs: [tag]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.tag.outputs.tag }}
          fetch-depth: "0"
          persist-credentials: "false"
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: '~> v2'
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: archives
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  installers-macos:
    name: macOS installers (universal pkg + dmg)
    needs: [tag, build]
    runs-on: macos-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.tag.outputs.tag }}
          persist-credentials: "false"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: archives
          path: in/
      - name: Build universal binary, pkg, dmg
        env:
          TAG: ${{ needs.tag.outputs.tag }}
        run: |
          set -euo pipefail
          VER="${TAG#v}"
          mkdir -p a b dist pkgroot dmgroot
          tar -xzf "in/ci-sandbox-go_${VER}_darwin_amd64.tar.gz" -C a
          tar -xzf "in/ci-sandbox-go_${VER}_darwin_arm64.tar.gz" -C b
          lipo -create a/ci-sandbox-go b/ci-sandbox-go -output ci-sandbox-go
          lipo -archs ci-sandbox-go | grep -q x86_64
          lipo -archs ci-sandbox-go | grep -q arm64
          cp ci-sandbox-go pkgroot/
          pkgbuild --root pkgroot \
            --identifier be.skylence.ci-sandbox-go \
            --version "$VER" \
            --install-location /usr/local/bin \
            "dist/ci-sandbox-go_${VER}_darwin_universal.pkg"
          cp ci-sandbox-go README.md LICENSE dmgroot/
          hdiutil create -volname "ci-sandbox-go" -srcfolder dmgroot -ov -format UDZO \
            "dist/ci-sandbox-go_${VER}_darwin_universal.dmg"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: installers-macos
          path: dist/*
          if-no-files-found: error

  installers-windows:
    name: Windows installer (msi)
    needs: [tag, build]
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.tag.outputs.tag }}
          persist-credentials: "false"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: archives
          path: in/
      - name: Build MSI (WiX, pinned)
        shell: bash
        env:
          TAG: ${{ needs.tag.outputs.tag }}
        run: |
          set -euo pipefail
          VER="${TAG#v}"
          mkdir -p bin dist
          7z x "in/ci-sandbox-go_${VER}_windows_amd64.zip" -obin >/dev/null
          dotnet tool install --global wix --version 5.0.2
          export PATH="$PATH:$HOME/.dotnet/tools"
          wix build -arch x64 \
            -d "Version=$VER" \
            -d "BinPath=bin/ci-sandbox-go.exe" \
            -o "dist/ci-sandbox-go_${VER}_windows_amd64.msi" \
            packaging/windows/ci-sandbox-go.wxs
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: installers-windows
          path: dist/*
          if-no-files-found: error

  publish:
    name: Attest, sign, release
    needs: [tag, build, installers-macos, installers-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: archives
          path: dist/
          merge-multiple: true
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: installers-*
          path: dist/
          merge-multiple: true
      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          sha256sum ./*.tar.gz ./*.zip ./*.pkg ./*.dmg ./*.msi > SHA256SUMS
          cat SHA256SUMS
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: dist/SHA256SUMS
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Keyless cosign sign + self-verify SHA256SUMS
        run: |
          set -euo pipefail
          cosign sign-blob --yes dist/SHA256SUMS --bundle dist/SHA256SUMS.sigstore.json
          cosign verify-blob dist/SHA256SUMS \
            --bundle dist/SHA256SUMS.sigstore.json \
            --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.tag.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "$TAG" -R "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes \
            dist/*.tar.gz dist/*.zip dist/*.pkg dist/*.dmg dist/*.msi \
            dist/SHA256SUMS dist/SHA256SUMS.sigstore.json
